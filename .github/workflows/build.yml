name: Build TgStat

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            archive_name: TgStat-Windows.zip
            artifact_name: TgStat-Windows
            icon: assets/icon.ico
            add_data: assets;assets
            pack_mode: --onedir
            dist_path: dist/TgStat

          - name: Linux
            os: ubuntu-latest
            archive_name: TgStat-Linux.zip
            artifact_name: TgStat-Linux
            icon: assets/icon.png
            add_data: assets:assets
            dist_path: dist/TgStat

          - name: macOS
            os: macos-latest
            archive_name: TgStat-macOS.zip
            artifact_name: TgStat-macOS
            icon: assets/icon.icns
            add_data: assets:assets
            dist_path: dist/TgStat.app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Linux system dependencies
        if: matrix.name == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk zip

      - name: Install macOS archive dependency
        if: matrix.name == 'macOS'
        run: |
          brew install zip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller flet==0.85.3 flet-cli==0.85.3 flet-map regex packaging

      - name: Check version matches tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          APP_VERSION=$(python -c "from version import VERSION; print(VERSION)")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
      
          if [ "$APP_VERSION" != "$TAG_VERSION" ]; then
            echo "Version mismatch: version.py has $APP_VERSION, but git tag is $GITHUB_REF_NAME"
            exit 1
          fi

      - name: Build Windows/Linux with Flet pack onedir
        if: matrix.name != 'macOS'
        run: |
          flet pack app.py --name TgStat --icon "${{ matrix.icon }}" --add-data "${{ matrix.add_data }}" --onedir

      - name: Build macOS with Flet pack default
        if: matrix.name == 'macOS'
        run: |
          flet pack app.py --name TgStat --icon "${{ matrix.icon }}" --add-data "${{ matrix.add_data }}"

      - name: Archive Windows
        if: matrix.name == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "${{ matrix.dist_path }}" -DestinationPath "${{ matrix.archive_name }}"

      - name: Archive Unix
        if: matrix.name != 'Windows'
        run: |
          zip -r "${{ matrix.archive_name }}" "${{ matrix.dist_path }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.archive_name }}

      - name: Extract release notes
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          import re

          tag = os.environ['GITHUB_REF_NAME']
          changelog = Path('CHANGELOG.md').read_text(encoding='utf-8')

          pattern = rf'^##\s+{re.escape(tag)}\s*$([\s\S]*?)(?=^##\s+|\Z)'
          match = re.search(pattern, changelog, flags=re.MULTILINE)

          if not match:
              raise SystemExit(f'No CHANGELOG section found for {tag}')

          notes = match.group(1).strip()
          Path('RELEASE_NOTES.md').write_text(notes + '\n', encoding='utf-8')
          PY

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive_name }}
          body_path: RELEASE_NOTES.md
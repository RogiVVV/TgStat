name: Build TgStat

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            archive_name: TgStat-Windows.zip
            artifact_name: TgStat-Windows
            icon: assets/icon.ico
            add_data: assets;assets
            dist_path: dist/TgStat

          - name: Linux
            os: ubuntu-latest
            archive_name: TgStat-Linux.zip
            artifact_name: TgStat-Linux
            icon: assets/icon.png
            add_data: assets:assets
            dist_path: dist/TgStat

          - name: macOS
            os: macos-latest
            archive_name: TgStat-macOS.zip
            artifact_name: TgStat-macOS
            icon: assets/icon.icns
            add_data: assets:assets
            dist_path: dist/TgStat.app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Linux system dependencies
        if: matrix.name == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk zip

      - name: Install macOS archive dependency
        if: matrix.name == 'macOS'
        run: |
          brew install zip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller flet==0.85.3 flet-cli==0.85.3 flet-map regex

      - name: Build with Flet pack
        run: |
          flet pack app.py --name TgStat --icon "${{ matrix.icon }}" --add-data "${{ matrix.add_data }}"

      - name: Archive Windows
        if: matrix.name == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "${{ matrix.dist_path }}" -DestinationPath "${{ matrix.archive_name }}"

      - name: Archive Unix
        if: matrix.name != 'Windows'
        run: |
          zip -r "${{ matrix.archive_name }}" "${{ matrix.dist_path }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.archive_name }}

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive_name }}
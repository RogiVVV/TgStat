name: Build and Release TgStat

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            spec: packaging/TgStat.windows.spec
            artifact_name: TgStat-Windows
            artifact_path: dist/TgStat
            archive_name: TgStat-Windows.zip

          - name: Linux
            os: ubuntu-latest
            spec: packaging/TgStat.linux.spec
            artifact_name: TgStat-Linux
            artifact_path: dist/TgStat
            archive_name: TgStat-Linux.tar.gz

          - name: macOS
            os: macos-latest
            spec: packaging/TgStat.macos.spec
            artifact_name: TgStat-macOS
            artifact_path: dist/TgStat.app
            archive_name: TgStat-macOS.zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk xdg-utils

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller pillow

      - name: Build application
        run: python -m PyInstaller --noconfirm --clean ${{ matrix.spec }}

      - name: Create Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "${{ matrix.artifact_path }}" -DestinationPath "${{ matrix.archive_name }}" -Force

      - name: Create Linux archive
        if: runner.os == 'Linux'
        run: |
          tar -czf "${{ matrix.archive_name }}" -C dist TgStat

      - name: Create macOS archive
        if: runner.os == 'macOS'
        run: |
          ditto -c -k --sequesterRsrc --keepParent "${{ matrix.artifact_path }}" "${{ matrix.archive_name }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.archive_name }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Extract changelog for current tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"

          if [ -f CHANGELOG.md ]; then
            awk "
              /^## ${VERSION}$/ { found=1; next }
              /^## / && found { exit }
              found { print }
            " CHANGELOG.md > release_notes.md
          fi

          if [ ! -s release_notes.md ]; then
            echo "Changes for ${VERSION}" > release_notes.md
          fi

      - name: Show release assets
        run: find release-assets -maxdepth 3 -type f -print

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: TgStat ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          files: |
            release-assets/TgStat-Windows/TgStat-Windows.zip
            release-assets/TgStat-Linux/TgStat-Linux.tar.gz
            release-assets/TgStat-macOS/TgStat-macOS.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
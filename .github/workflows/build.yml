name: Build TgStat

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            spec: packaging/TgStat.windows.spec
            artifact_name: TgStat-Windows
            archive_name: TgStat-Windows.zip

          - name: Linux
            os: ubuntu-latest
            spec: packaging/TgStat.linux.spec
            artifact_name: TgStat-Linux
            archive_name: TgStat-Linux.zip

          - name: macOS
            os: macos-latest
            spec: packaging/TgStat.macos.spec
            artifact_name: TgStat-macOS
            archive_name: TgStat-macOS.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Linux system dependencies
        if: matrix.name == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk libgtk-3-0 libmpv-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller flet==0.85.3 flet-map regex

      - name: Build
        run: |
          python -m PyInstaller --clean --noconfirm ${{ matrix.spec }}

      - name: Archive Windows
        if: matrix.name == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/TgStat -DestinationPath ${{ matrix.archive_name }}

      - name: Archive Linux
        if: matrix.name == 'Linux'
        run: |
          cd dist
          zip -r ../${{ matrix.archive_name }} TgStat

      - name: Archive macOS
        if: matrix.name == 'macOS'
        run: |
          cd dist
          zip -r ../${{ matrix.archive_name }} TgStat.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.archive_name }}

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive_name }}
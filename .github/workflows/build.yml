name: Build TgStat

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            spec: TgStat.windows.spec
            artifact_name: packaging/TgStat-Windows
            artifact_path: dist/TgStat
          - name: Linux
            os: ubuntu-latest
            spec: packaging/TgStat.linux.spec
            artifact_name: TgStat-Linux
            artifact_path: dist/TgStat
          - name: macOS
            os: macos-latest
            spec: packaging/TgStat.macos.spec
            artifact_name: TgStat-macOS
            artifact_path: dist/TgStat.app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk xdg-utils

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build application
        run: pyinstaller ${{ matrix.spec }} --noconfirm --clean

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
